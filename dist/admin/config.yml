backend:
  name: git-gateway
  branch: main
publish_mode: editorial_workflow
media_folder: src/images
public_folder: /images
collections:
  - name: pages
    label: Pages
    files:
      - label: Homepage
        name: home
        file: src/index.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/home.html
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Sidebar
            name: aside
            widget: markdown
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: About
        name: about
        file: src/about.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/about.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /about/
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Sidebar
            name: aside
            widget: markdown
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: Contact
        name: contact
        file: src/contact.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/contact.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /contact/
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Feature image
            name: featureImage
            widget: image
            required: false
          - label: Feature image caption
            name: featureImageCaption
            widget: string
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
          - label: Sidebar
            name: aside
            widget: markdown
            required: false
          - label: Body
            name: body
            widget: markdown
            required: false
      - label: Advice index
        name: blog
        file: src/blog.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/feed.html
          - label: Title
            name: title
            widget: string
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Intro
            name: lede
            widget: markdown
            required: false
      - label: FAQs
        name: faqs
        file: src/faqs.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/faqs.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /faqs/
          - label: Title
            name: title
            widget: string
            default: Frequently asked questions
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Lede
            name: lede
            widget: markdown
            required: false
      - label: Products
        name: products
        file: src/products.md
        fields:
          - label: Layout
            name: layout
            widget: hidden
            default: layouts/products.html
          - label: Permalink
            name: permalink
            widget: hidden
            default: /products/
          - label: Title
            name: title
            widget: string
            default: Products
          - label: Meta description
            name: metaDesc
            widget: text
            required: false
          - label: Lede
            name: lede
            widget: markdown
            required: false
  - name: globals
    label: Globals
    files:
      - label: Site data
        name: site_data
        file: src/_data/site-content.json
        fields:
          - label: Site name
            name: name
            widget: string
            required: false
          - label: Site URL
            name: url
            widget: string
            required: false
          - label: Address line 1
            name: address1
            widget: string
            required: false
          - label: Address line 2
            name: address2
            widget: string
            required: false
          - label: Town/city
            name: townCity
            widget: string
            required: false
          - label: County/state
            name: countyState
            widget: string
            required: false
          - label: Postcode
            name: postcode
            widget: string
            required: false
          - label: Country
            name: country
            widget: string
            required: false
          - label: Copyright owner
            name: copyrightOwner
            widget: string
            required: false
          - label: Email
            name: email
            widget: string
            required: false
          - label: Telephone
            name: telephone
            widget: string
            required: false
      - label: Main navigation
        name: navigation
        file: src/_data/navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
      - label: Footer navigation
        name: footer_navigation
        file: src/_data/footer_navigation.json
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - label: Text
                name: text
                widget: string
              - label: URL
                name: url
                widget: string
  - name: posts
    label: Posts
    folder: src/posts
    create: true
    slug: '{{slug}}'
    preview_path: blog/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Publish date
        name: date
        widget: datetime
      - label: Author
        name: postAuthor
        widget: string
      - label: Summary
        name: postSummary
        widget: text
      - label: Categories
        name: postCategories
        widget: list
        allow_add: true
      - label: Tags
        name: postTags
        widget: list
        allow_add: true
      - label: Body
        name: body
        widget: markdown
  - name: faqs
    label: FAQs
    folder: src/faqs
    create: true
    slug: '{{slug}}'
    preview_path: faqs
    fields:
      - label: Question
        name: question
        widget: string
      - label: Answer
        name: answer
        widget: markdown
      - label: Category
        name: category
        widget: string
      - label: Order
        name: order
        widget: number
        value_type: int
        min: 1
  - name: products
    label: Products
    folder: src/products
    create: true
    slug: '{{slug}}'
    preview_path: products/{{slug}}
    fields:
      - label: Title
        name: title
        widget: string
      - label: Part number
        name: partNumber
        widget: string
      - label: Summary
        name: summary
        widget: text
      - label: Category
        name: category
        widget: string
      - label: Manufacturer
        name: manufacturer
        widget: string
      - label: Body
        name: body
        widget: markdown
        required: false
